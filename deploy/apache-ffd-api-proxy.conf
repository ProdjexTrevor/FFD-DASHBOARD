# Apache reverse proxy for the dashboard API (cPanel / host07)
# Place in the document root for ffd-api.prodjex.com, or include in the vhost.

<IfModule mod_proxy.c>
  ProxyPreserveHost On
  ProxyPass / http://127.0.0.1:3001/
  ProxyPassReverse / http://127.0.0.1:3001/
</IfModule>

# If mod_proxy is unavailable, ask Prodjex to enable it or use the nginx example instead.
